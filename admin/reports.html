<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-HAW Panel — Report List</title>
  <link rel="stylesheet" href="css/reports.css" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <aside class="sidebar" role="navigation" aria-label="Main Navigation">
    <div class="sidebar__logo" title="E-HAW Panel Home">
      <img src="images/7.png" alt="E-HAW Logo" class="logo-icon" />
    </div>

    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__nav-item" aria-label="Home" title="Home">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M3 12L12 3L21 12V21H15V15H9V21H3V12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/>
        </svg>
      </a>

      <a href="reports.html" class="sidebar__nav-item active" aria-label="Reports" title="Reports">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="4" y="3" width="12" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
          <path d="M8 8H12M8 12H14M8 16H11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M14 3V7H20" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M14 3L20 9V19H16" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </a>

      <a href="accounts.html" class="sidebar__nav-item" aria-label="Accounts" title="Accounts">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="8" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
          <path d="M2 21C2 17.134 4.686 14 8 14H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M17 14L19 16L23 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </nav>

    <div class="sidebar__footer">
      <button class="sidebar__nav-item sidebar__logout" aria-label="Logout" title="Logout" id="sidebarLogout">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </aside>

  <div class="main-wrapper">
    <div class="bg-overlay" aria-hidden="true"></div>

    <header class="topbar" role="banner">
      <a href="index.html" class="topbar__brand">
        <span class="topbar__brand-text">E-HAW PANEL</span>
      </a>

      <div class="topbar__user" id="userMenu" role="button" tabindex="0" aria-haspopup="true" aria-expanded="false">
        <span class="topbar__username">Hi! <strong>Admin</strong></span>
        <div class="topbar__avatar">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M4 20C4 16.686 7.582 14 12 14C16.418 14 20 16.686 20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="topbar__dropdown" id="userDropdown">
          <button class="topbar__dropdown-item" id="logoutBtn">Logout</button>
        </div>
      </div>
    </header>

    <main class="content" role="main">

      <section class="section" aria-labelledby="reports-heading">
        <div class="section__header">
          <h2 class="section__title" id="reports-heading">
            Report List
            <svg class="section__title-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="width:18px;height:18px;color:var(--text-muted)">
              <path d="M3 6H21M3 12H15M3 18H9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M17 9l4 3-4 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </h2>

          <button class="section__action-btn" title="Export" aria-label="Export reports">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="7 10 12 15 17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div class="table-card" role="region" aria-label="Report Table">
          <div class="filter-wrapper" style="display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--table-border);">
            <label for="validityFilter" style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Filter:</label>
            <select id="validityFilter" class="validity-select" style="background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 4px 10px; font-size: 0.85rem; cursor: pointer; outline: none; transition: border 0.2s ease;">
              <option value="all">All Records</option>
              <option value="Awaiting Review">Awaiting Review</option>
              <option value="Valid">Valid</option>
              <option value="Invalid">Invalid</option>
            </select>
          </div>

          <table class="report-table" aria-label="List of reports">
            <thead>
              <tr>
                <th scope="col">Report Number</th>
                <th scope="col">Date</th>
                <th scope="col">Category</th>
                <th scope="col">Validity</th>
                <th scope="col">Status</th>
                <th scope="col" style="text-align: right;">Action</th>
              </tr>
            </thead>
            <tbody id="reportTableBody"></tbody> 
          </table>
        </div>
      </section>

    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true"
        aria-labelledby="modalReportId" aria-hidden="true">
    <div class="modal" id="reportModal">
      <button class="modal-close" id="modalClose" aria-label="Close modal">&#10005;</button>

      <div class="modal-header-bar">
        <span class="modal-report-id" id="modalReportId">ID</span>
        <span class="modal-divider">|</span>
        <span class="modal-date" id="modalDate">Date</span>
        <span class="modal-section-label" style="margin-right: 30px;">Incident Details</span>
      </div>

      <div class="modal-body">
        <div class="modal-left">
          <div class="modal-profile-img-wrap">
            <img src="" alt="Incident photo" class="modal-profile-img" id="modalProfileImg" />
          </div>
          <div class="modal-info">
            <p class="modal-info-label">Name</p>
            <p class="modal-info-value" id="modalName">Anonymous Resident</p>
          </div>
        </div>

        <div class="modal-right">
          <div class="modal-description-box" id="modalDescription"
                role="region" aria-label="Report description" tabindex="0">
            </div>
        </div>
      </div>

      <div class="modal-footer" id="modalFooter">
        </div>
    </div>
  </div>
  <div class="image-lightbox" id="imageLightbox" role="dialog">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img src="" id="lightboxImg" alt="Enlarged evidence" />
  </div>

  <script src="js/reports.js"></script>
</body>
</html>
