<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-HAW Portal</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #d4ede2;
        }
        .portal {
            text-align: center;
            padding: 40px;
        }
        h1 {
            color: #2e7d5e;
            font-size: 3rem;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            display: inline-block;
            padding: 15px 30px;
            background: #2e7d5e;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        .links a:hover {
            background: #3a9970;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="portal">
        <h1>E-HAW Portal</h1>
        <div class="links">
            <a href="home.html">🏠 Home</a>
            <a href="report.html">📝 Report</a>
            <a href="about.html">ℹ️ About Us</a>
            <a href="login.html">🔑 Login</a>
            <a href="signup.html">📝 Sign Up</a>
        </div>
    </div>
</body>
</html>
