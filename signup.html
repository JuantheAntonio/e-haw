<!-- signup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Barangay Kamputhaw</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/signup.css" />
</head>
<body>
  <div class="page">

    <!-- HERO IMAGE -->
    <div class="hero">
      <img src="images/signup_bg.png" alt="Aerial view of Barangay Kamputhaw" />
    </div>

    <!-- SIGN UP CARD -->
    <div class="card">

      <h1>Sign Up</h1>

      <div class="signup-form" id="signupForm">

        <!-- Username -->
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input type="text" id="username" placeholder="Username" autocomplete="username" />
        </div>

        <!-- Email -->
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <polyline points="2,4 12,13 22,4"/>
            </svg>
          </span>
          <input type="email" id="email" placeholder="Email" autocomplete="email" />
        </div>

        <!-- Password -->
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" placeholder="Password" autocomplete="new-password" />
        </div>

        <!-- Confirm Password -->
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="confirmPassword" placeholder="Confirm Password" autocomplete="new-password" />
        </div>

        <button class="btn-signup" type="button" id="signupBtn">Sign Up</button>

        <p class="login-link">Already have an account? <a href="login.html">Log In</a></p>
      </div><!-- /.signup-form -->

      <p class="privacy">
        By creating an account, you consent to the collection and processing of your personal
        information as required by the <a href="data-privacy.html">Data Privacy Act of 2012</a> and the
        <a href="privacy-policy.html">Barangay Kamputhaw Privacy Policy</a>.
      </p>
    </div><!-- /.card -->

  </div><!-- /.page -->

  <script src="js/signup.js"></script>
</body>
</html>
